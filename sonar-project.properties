sonar.projectKey=Callmesammy_MutiSaaSApp
sonar.organization=callmesammy

# Source code paths
sonar.sources=Domain,Application,Infastructure,MutiSaaSApp
sonar.tests=MultiSaasTest

# Exclude paths
sonar.exclusions=**/bin/**,**/obj/**,**/migrations/**,**/*.dbmdl,**/logs/**

# Test exclusions
sonar.test.exclusions=**/bin/**,**/obj/**

# Coverage
sonar.coverage.exclusions=**/*.Tests/**,**/bin/**,**/obj/**
sonar.cs.opencover.reportsPaths=**/coverage.opencover.xml

# Code smells
sonar.cpd.exclusions=**/bin/**,**/obj/**

# Duplicates
sonar.core.codeCoveragePlugin=cobertura

# C# specific
sonar.language=cs
sonar.sources.inclusions=**/*.cs

# Ignore warnings in generated files
sonar.exclusions=**/Migrations/**
