apiVersion: v1
kind: ConfigMap
metadata:
  name: mutisaas-config
  namespace: mutisaas-production
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  Logging__LogLevel__Default: "Warning"
  Serilog__MinimumLevel__Default: "Information"

---
apiVersion: v1
kind: Secret
metadata:
  name: mutisaas-secrets
  namespace: mutisaas-production
type: Opaque
stringData:
  ConnectionStrings__DefaultConnection: "Server=sqlserver-production;Database=MutiSaaSAppDb;User Id=sa;Password=ProductionPassword123!;Encrypt=false;TrustServerCertificate=true;"
  Redis__ConnectionString: "redis-production:6379"
  Jwt__Secret: "your-production-secret-key-min-32-chars-change-in-production-12345"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mutisaas-api
  namespace: mutisaas-production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mutisaas-api
  template:
    metadata:
      labels:
        app: mutisaas-api
    spec:
      containers:
      - name: mutisaas-api
        image: ghcr.io/callmesammy/mutisaasapp:master
        ports:
        - containerPort: 5000
        envFrom:
        - configMapRef:
            name: mutisaas-config
        - secretRef:
            name: mutisaas-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

---
apiVersion: v1
kind: Service
metadata:
  name: mutisaas-api
  namespace: mutisaas-production
spec:
  selector:
    app: mutisaas-api
  ports:
  - port: 80
    targetPort: 5000
  type: LoadBalancer

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mutisaas-api-hpa
  namespace: mutisaas-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mutisaas-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
